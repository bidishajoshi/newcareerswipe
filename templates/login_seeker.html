{% extends "base.html" %}
{% block title %}Seeker Login – CareerSwipe{% endblock %}
{% block content %}
<div class="auth-wrap seeker-theme">
  <div class="auth-card" style="max-width:420px">
    <div class="auth-header">
      <span class="role-badge badge-seeker"> </span>
      <h2>Welcome back</h2>
      <p>Sign in to your seeker account</p>
    </div>
    <form method="POST" class="auth-form">
      <div class="field">
        <label>Email address</label>
        <input type="email" name="email" required autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
      <p class="auth-link">Don't have an account? <a href="{{ url_for('register_seeker') }}">Register</a></p>
    </form>
  </div>
</div>
{% endblock %}
